<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="pad" cx="40%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#b3d4f4"/>
      <stop offset="52%" stop-color="#7eb3e8"/>
      <stop offset="100%" stop-color="#4c83bf"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2138"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <!-- Clip = full disc MINUS a wedge, so veins/highlight never spill off-pad -->
    <clipPath id="padclip">
      <path d="M 256 248
               m -150 0
               a 150 150 0 1 0 300 0
               a 150 150 0 1 0 -300 0 Z
               M 256 248 L 414 286 L 414 316 Z"
            clip-rule="evenodd"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#water)"/>

  <!-- Ripples -->
  <g fill="none" stroke="#7eb3e8" stroke-opacity="0.15" stroke-width="6">
    <ellipse cx="256" cy="320" rx="150" ry="36"/>
    <ellipse cx="256" cy="320" rx="194" ry="50"/>
  </g>

  <!-- Disc -->
  <circle cx="256" cy="248" r="150" fill="url(#pad)"/>

  <!-- Notch wedge cut (paint water color over the disc) -->
  <path d="M 256 248 L 414 286 L 414 316 Z" fill="url(#water)"/>
  <path d="M 256 248 L 414 286 L 414 316 Z" fill="#0a1a2e"/>

  <!-- Veins + rim, clipped to the pad shape -->
  <g clip-path="url(#padclip)">
    <g stroke="#2a4f78" stroke-opacity="0.5" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M 256 248 L 250 100"/>
      <path d="M 256 248 L 140 160"/>
      <path d="M 256 248 L 112 262"/>
      <path d="M 256 248 L 150 358"/>
      <path d="M 256 248 L 250 396"/>
    </g>
    <circle cx="256" cy="248" r="146" fill="none" stroke="#c3ddf6" stroke-opacity="0.45" stroke-width="6"/>
  </g>
</svg>
