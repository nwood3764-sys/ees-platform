# Supabase project config (function-specific overrides only). The CLI
# and dashboard are the source of truth for everything else.

# signing-portal-load and signing-portal-submit are invoked by recipients
# who are NOT LEAP users and have no Supabase session. The signing token
# in the URL IS the auth — both functions validate it against
# envelope_recipients.recipient_signing_token internally before doing
# anything sensitive. They use the service role key to read/write under
# RLS-protected tables.
[functions.signing-portal-load]
verify_jwt = false

[functions.signing-portal-submit]
verify_jwt = false

# request-password-reset-sms is the login screen's "text me a reset link"
# flow — the requester by definition has no session. It leaks nothing
# (constant response), texts only the number on file, and rate-limits per
# phone + per IP via password_reset_sms_requests.
[functions.request-password-reset-sms]
verify_jwt = false
